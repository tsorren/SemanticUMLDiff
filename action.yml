name: 'Semantic UML Diff'
description: 'Generates semantic diff diagrams for PlantUML architectures and posts them to PRs.'
branding:
  icon: git-pull-request
  color: purple
inputs:
  base_uml_dir:
    description: 'Path to the directory containing base PlantUML files'
    required: true
  pr_uml_dir:
    description: 'Path to the directory containing PR PlantUML files'
    required: true
  github_token:
    description: 'GitHub token for PR commenting'
    required: false
    default: ${{ github.token }}
  layout_orthogonal_lines:
    description: 'Use orthogonal lines instead of curved lines for relationships'
    required: false
    default: 'false'
  method_parameter_style:
    description: 'How to display method parameters: types_only or names_and_types'
    required: false
    default: 'types_only'
  group_by_package:
    description: 'Group classes by their namespace/package using PlantUML package blocks'
    required: false
    default: 'true'
  theme:
    description: 'Theming style for the PlantUML diagram'
    required: false
    default: 'modern'
  diagram_spacing:
    description: 'Nodesep and ranksep values for spacing'
    required: false
    default: '30'
  root_package:
    description: 'Root package prefix for filtering external libraries. If left empty, it will be auto-detected'
    required: false
    default: ''
  context_depth:
    description: 'Depth of the context graph for impacted classes'
    required: false
    default: '1'
runs:
  using: 'docker'
  image: 'Dockerfile'